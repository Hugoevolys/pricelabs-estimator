# Config Netlify — le "base" pointe vers le dossier frontend.
# Si tu connectes le repo entier à Netlify, garde "base = frontend".

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# SPA : toutes les routes renvoient vers index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
